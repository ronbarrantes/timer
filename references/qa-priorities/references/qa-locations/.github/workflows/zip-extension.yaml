name: Zip Extension

on:
  push:
    branches:
      - main

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build zip file
        run: ./build-zip.sh

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: qa-locations-zip
          path: dist/qa-locations.zip
          if-no-files-found: error
